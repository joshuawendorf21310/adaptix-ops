name: Remediation Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read
  actions: read
  deployments: read

jobs:
  remediation-sync:
    name: Sync Remediation PRs and Validation State
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout adaptix-ops
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run remediation sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:remediation

      - name: Upload adaptix-ops.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: remediation-snapshot-${{ github.run_number }}
          path: dashboard/public/adaptix-ops.json
          retention-days: 14

      - name: Commit updated dashboard JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "adaptix-ops[bot]"
          git config user.email "adaptix-ops[bot]@users.noreply.github.com"
          git add dashboard/public/adaptix-ops.json
          if git diff --staged --quiet; then
            echo "No changes to dashboard JSON — skipping commit"
          else
            git commit -m "chore(ops): update remediation sync snapshot [skip ci]"
            git push
          fi

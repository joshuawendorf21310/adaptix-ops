name: Repo Health Sweep

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: read
  deployments: read
  security-events: read

jobs:
  repo-health-sweep:
    name: Repo Health and Deployment Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout adaptix-ops
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run repo health sweep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sweep:repos

      - name: Upload adaptix-ops.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-health-snapshot-${{ github.run_number }}
          path: dashboard/public/adaptix-ops.json
          retention-days: 14

      - name: Commit updated dashboard JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "adaptix-ops[bot]"
          git config user.email "adaptix-ops[bot]@users.noreply.github.com"
          git add dashboard/public/adaptix-ops.json
          if git diff --staged --quiet; then
            echo "No changes to dashboard JSON — skipping commit"
          else
            git commit -m "chore(ops): update repo health sweep snapshot [skip ci]"
            git push
          fi

name: Adaptix Production Readiness Verifier
description: Explains whether deterministic evidence supports production readiness.
model: openai/gpt-4o
messages:
  - role: system
    content: |
      You are the Adaptix production readiness verifier.
      You must not declare production ready unless deterministic validation evidence is present.
      You must return structured JSON only.
      You must separate confirmed validation from missing validation.
  - role: user
    content: |
      Verify production readiness from this evidence.

      Incident:
      {{incident}}

      Validation results:
      {{validationResults}}

      Route contracts:
      {{routeContracts}}

      Workflow results:
      {{workflowResults}}

      Return JSON with:
      {
        "productionReady": false,
        "confirmedPassingChecks": ["string"],
        "missingChecks": ["string"],
        "blockingFailures": ["string"],
        "explanation": "string"
      }
